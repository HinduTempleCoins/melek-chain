# MELEK testnet single-witness config

log-console-appender = {"appender":"stderr","stream":"std_error"}
log-logger = {"name":"default","level":"info","appender":"stderr"}

# Plugins
plugin = webserver p2p json_rpc witness
plugin = database_api condenser_api network_broadcast_api block_api account_by_key account_by_key_api

# Network — single node, no p2p
p2p-endpoint = 127.0.0.1:2001
p2p-seed-node =
webserver-http-endpoint = 127.0.0.1:8090
webserver-ws-endpoint = 127.0.0.1:8091

# Shared memory (small for codespace)
shared-file-size = 4G
shared-file-full-threshold = 9500
shared-file-scale-rate = 1000

# Witness — initminer + hathor share the same testnet key
witness = "initminer"
witness = "hathor"
private-key = 5JNHfZYKGaomSFvd4NUdQ9qMcEAC43kujbfjueTHpVapX1Kzq2n
enable-stale-production = true
required-participation = 0
